  <rect x="340" y="138" width="440" height="292" rx="22" fill="url(#core)"/>
  <rect x="366" y="166" width="388" height="42" rx="10" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
