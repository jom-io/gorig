  <path d="M120 366H148M120 384H188M120 402H164" stroke="#FF7A59" stroke-width="4" stroke-linecap="round"/>
  <text x="120" y="430" fill="#142131" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="850">生成更快</text>
