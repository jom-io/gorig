  <text x="374" y="501" fill="#607384" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12">稳定分层与源码规则</text>

  <rect x="584" y="444" width="230" height="82" rx="14" fill="#FFFFFF" stroke="#E1E8EF" filter="url(#tightShadow)"/>
