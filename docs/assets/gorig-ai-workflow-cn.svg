  <text x="388" y="287" fill="#FFFFFF" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="900">生产级后端服务</text>
  <text x="388" y="318" fill="#C5D5D9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">产品需求变成模块结构、真实 API、验证结果，</text>
  <text x="388" y="340" fill="#C5D5D9" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">并进入可观察、可运维的交付状态。</text>

