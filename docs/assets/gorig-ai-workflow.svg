  <text x="460" y="192" fill="#DCE9ED" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">gorig-cli + gorig-backend skill</text>

  <text x="388" y="252" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900">One system for AI-built</text>
  <text x="388" y="287" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900">production backends</text>
  <text x="388" y="318" fill="#C5D5D9" font-family="Inter, Arial, sans-serif" font-size="15">Structured modules, current APIs,</text>
  <text x="388" y="340" fill="#C5D5D9" font-family="Inter, Arial, sans-serif" font-size="15">verified behavior, and operational visibility.</text>

  <rect x="388" y="354" width="79" height="32" rx="16" fill="#FF7A59"/>
  <text x="409" y="375" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850">create</text>
  <rect x="478" y="354" width="88" height="32" rx="16" fill="#2CB67D"/>
  <text x="499" y="375" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850">govern</text>
