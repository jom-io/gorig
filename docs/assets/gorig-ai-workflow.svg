  <text x="120" y="430" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Generate faster</text>
  <text x="120" y="454" fill="#607384" font-family="Inter, Arial, sans-serif" font-size="12">Project, module, CRUD, docs</text>

  <rect x="306" y="444" width="230" height="82" rx="14" fill="#FFFFFF" stroke="#E1E8EF" filter="url(#tightShadow)"/>
  <circle cx="334" cy="480" r="16" fill="#E4F8EE"/>
  <path d="M326 480L332 486L343 473" stroke="#1F7A4B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="374" y="477" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">Govern AI output</text>
  <text x="374" y="501" fill="#607384" font-family="Inter, Arial, sans-serif" font-size="12">Stable layers and source rules</text>

  <rect x="584" y="444" width="230" height="82" rx="14" fill="#FFFFFF" stroke="#E1E8EF" filter="url(#tightShadow)"/>
  <circle cx="612" cy="480" r="16" fill="#E7F0FF"/>
  <path d="M603 480H621M612 471V489" stroke="#2F6EDB" stroke-width="3" stroke-linecap="round"/>
  <text x="652" y="477" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">Verify behavior</text>
  <text x="652" y="501" fill="#607384" font-family="Inter, Arial, sans-serif" font-size="12">Build, tests, smoke checks</text>

  <rect x="826" y="342" width="198" height="128" rx="14" fill="#FFFFFF" stroke="#E1E8EF" filter="url(#tightShadow)"/>
  <path d="M884 386C884 372 897 362 912 362H944C959 362 972 372 972 386C972 400 959 410 944 410H912C897 410 884 400 884 386Z" fill="#FFF2D5"/>
  <path d="M908 386L920 394L948 372" stroke="#8B6111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="850" y="424" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">Operate with</text>
  <text x="850" y="446" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">eyes open</text>
  <text x="850" y="466" fill="#607384" font-family="Inter, Arial, sans-serif" font-size="12">Health, logs, metrics, rollback</text>

