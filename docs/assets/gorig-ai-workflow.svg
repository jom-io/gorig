<svg width="1120" height="620" viewBox="0 0 1120 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gorig AI-native backend delivery system</title>
  <desc id="desc">A product-oriented visual showing how Gorig turns a business idea into a governed, verified, observable backend service with CLI, skill, runtime, hub, node, and operations tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.52" stop-color="#F4F7F2"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <linearGradient id="core" x1="330" y1="118" x2="790" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132238"/>
      <stop offset="0.55" stop-color="#183B42"/>
      <stop offset="1" stop-color="#214931"/>
    </linearGradient>
    <linearGradient id="beam" x1="184" y1="235" x2="934" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A59" stop-opacity="0.95"/>
      <stop offset="0.34" stop-color="#2CB67D" stop-opacity="0.95"/>
      <stop offset="0.67" stop-color="#3B82F6" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F5B841" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-24%" width="140%" height="152%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1C2E3D" flood-opacity="0.16" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tightShadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1C2E3D" flood-opacity="0.12" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#33515E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1120" height="620" rx="28" fill="url(#bg)"/>
  <path d="M70 470C172 401 218 386 332 417C438 446 498 500 633 461C760 424 835 329 1038 364" stroke="#D5E4DC" stroke-width="2"/>
  <path d="M80 160C190 94 294 95 394 142C481 183 545 198 641 149C764 86 882 76 1036 132" stroke="#E8D7C3" stroke-width="2"/>

  <text x="72" y="83" fill="#152333" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Gorig</text>
  <text x="72" y="123" fill="#122032" font-family="Inter, Arial, sans-serif" font-size="39" font-weight="900">AI-native backend delivery</text>
  <text x="72" y="153" fill="#536575" font-family="Inter, Arial, sans-serif" font-size="16">From intent to production.</text>

  <rect x="72" y="196" width="220" height="104" rx="12" fill="#FFFFFF" stroke="#E1E8EF" filter="url(#tightShadow)"/>
  <rect x="96" y="218" width="56" height="16" rx="8" fill="#FFE4D9"/>
  <text x="100" y="230" fill="#A13D22" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800">INTENT</text>
  <text x="96" y="258" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850">Business request</text>
  <text x="96" y="286" fill="#607384" font-family="Inter, Arial, sans-serif" font-size="12">CRUD, auth, jobs, APIs, ops</text>

  <rect x="828" y="196" width="220" height="104" rx="12" fill="#FFFFFF" stroke="#E1E8EF" filter="url(#tightShadow)"/>
  <rect x="852" y="218" width="66" height="16" rx="8" fill="#DFF6EA"/>
  <text x="856" y="230" fill="#1F7A4B" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800">SHIPPED</text>
  <text x="852" y="258" fill="#142131" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850">Runnable backend</text>
  <text x="852" y="286" fill="#607384" font-family="Inter, Arial, sans-serif" font-size="12">Code, tests, docs, dashboard</text>

