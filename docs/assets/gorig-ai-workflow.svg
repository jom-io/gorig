  <text x="210" y="580" fill="#485C6C" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750">gorig-backend skill</text>
  <circle cx="356" cy="575" r="3" fill="#9DAFBC"/>
  <text x="376" y="580" fill="#485C6C" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750">Gorig framework</text>
